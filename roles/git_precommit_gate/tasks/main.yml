---
# Shared installer, single source of truth for both the LXC and VM
# deployment paths (backlog #308 -- previously duplicated). This role now
# just stages the canonical script + support files and invokes it; all the
# actual install/verify/wire logic lives in install-git-hooks.sh.

- name: git-precommit-gate | create staging directory
  ansible.builtin.file:
    path: /opt/git-hooks-stage
    state: directory
    mode: '0755'

- name: git-precommit-gate | stage installer + support files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/git-hooks-stage/{{ item }}"
    mode: "{{ '0755' if item == 'install-git-hooks.sh' else '0644' }}"
  loop:
    - install-git-hooks.sh
    - gitleaks.toml
    - pre-commit-gitleaks.sh
    - pre-push-gitleaks.sh
    - pre-commit
    - pre-push

- name: git-precommit-gate | run the canonical installer
  ansible.builtin.command: /opt/git-hooks-stage/install-git-hooks.sh
  environment:
    GITLEAKS_VERSION: "{{ git_precommit_gate_gitleaks_version }}"
    TARGET_USER: "{{ git_precommit_gate_user }}"
    FILES_DIR: /opt/git-hooks-stage
    REPOS: "{{ git_precommit_gate_repos | join(' ') }}"
  register: git_precommit_gate_result
  changed_when: "'installed and checksum-verified' in git_precommit_gate_result.stdout"
  failed_when: false

- name: git-precommit-gate | fail loudly if the installer reported an error (Hermes F5)
  ansible.builtin.fail:
    msg: "Installer failed on this host -- {{ git_precommit_gate_result.stdout }} {{ git_precommit_gate_result.stderr }}"
  when: git_precommit_gate_result.rc != 0

- name: git-precommit-gate | result
  ansible.builtin.debug:
    msg: "{{ git_precommit_gate_result.stdout_lines }}"
