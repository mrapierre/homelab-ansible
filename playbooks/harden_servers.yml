---
# Sevenbirches Homelab — Common Server Hardening Playbook
# Applies to: VPS servers (Oracle, ihostart) and VM151
# Covers: SSH hardening, UFW firewall, fail2ban, unattended upgrades
#
# Usage:
#   ansible-playbook playbooks/harden_servers.yml --limit oracle
#   ansible-playbook playbooks/harden_servers.yml --limit vps_ihostart
#   ansible-playbook playbooks/harden_servers.yml  # all servers

- name: Common server hardening
  hosts: all_servers
  become: true
  vars:
    ssh_allowed_ports:
      - 22
    ufw_extra_ports: []  # Override per host in host_vars/

  tasks:

    - name: Install security packages
      ansible.builtin.apt:
        name:
          - ufw
          - fail2ban
          - unattended-upgrades
        state: present
        update_cache: true

    - name: Harden SSH config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        backup: true
      loop:
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin prohibit-password' }
        - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
      notify: Reload SSH

    - name: Configure fail2ban
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime  = 1h
          findtime = 10m
          maxretry = 3
          backend  = systemd

          [sshd]
          enabled  = true
          port     = ssh
          logpath  = %(sshd_log)s
          maxretry = 3
          bantime  = 24h
      notify: Restart fail2ban

    - name: Enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true

    - name: Set UFW default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: Set UFW default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp
        comment: SSH

    - name: Allow extra ports (host-specific)
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
        comment: "{{ item.comment | default('') }}"
      loop: "{{ ufw_extra_ports }}"
      when: ufw_extra_ports | length > 0

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Enable unattended upgrades
      ansible.builtin.service:
        name: unattended-upgrades
        state: started
        enabled: true

  handlers:
    - name: Reload SSH
      ansible.builtin.service:
        name: ssh
        state: reloaded

    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted
