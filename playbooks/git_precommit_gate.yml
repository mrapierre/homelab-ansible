---
# Universal git pre-commit + pre-push secret-scanning gate (backlog #305/#306)
# Idempotent -- safe to re-run against hosts that already have it. Needs no
# credentials -- installing/wiring the gate is credential-free.
#
# CT148 is normally kept stopped between sessions (Android Studio build
# container). This playbook does NOT start it automatically -- run
# `pct start 148` manually first, run this playbook (--limit ct148 or the
# default full run), then `pct stop 148` when done.
#
# Usage:
#   ansible-playbook playbooks/git_precommit_gate.yml
#   ansible-playbook playbooks/git_precommit_gate.yml --limit vm151
#   ansible-playbook playbooks/git_precommit_gate.yml --tags lxc
#   ansible-playbook playbooks/git_precommit_gate.yml --check --diff   (dry run)
#
# Both plays now share ONE canonical installer (roles/git_precommit_gate/
# files/install-git-hooks.sh, backlog #308). LXC containers go through
# `pct exec` from the pve host (this repo's established pattern for LXC --
# see harden_containers.yml; the community.proxmox.proxmox_pct_remote
# connection plugin has proven unreliable here and is intentionally not
# used) to push the script in and run it. VM151 is direct SSH, so the
# git_precommit_gate role runs the same script directly.
#
# NOTE: if you bump git_precommit_gate_gitleaks_version, you MUST also
# update git_precommit_gate_gitleaks_checksums_sha256 below to match the new
# version's checksums.txt (backlog #305 follow-up F3) -- the installer
# deliberately fails loudly rather than silently accepting a mismatch. Get
# the value with:
#   curl -fsSL -o checksums.txt https://github.com/gitleaks/gitleaks/releases/download/vX.Y.Z/gitleaks_X.Y.Z_checksums.txt
#   sha256sum checksums.txt

- name: Deploy git pre-commit/pre-push gate — LXC containers via pct exec
  hosts: pve
  become: false
  tags: [git_precommit_gate, lxc]
  vars:
    git_precommit_gate_gitleaks_version: "8.30.1"
    git_precommit_gate_gitleaks_checksums_sha256: "061476c21adaf5441516f96f185c1a4706a83cd6329b9b38762271b3d4a52fae"
    git_precommit_gate_files_dir: "{{ playbook_dir }}/../roles/git_precommit_gate/files"
    # vmid -> list of repo paths to wire core.hooksPath for on that container.
    # CT148's repos are owned by 'anthony', not root.
    git_precommit_gate_lxc:
      104:
        user: root
        repos:
          - /opt/ansible
          - /opt/mcp-server
      120:
        user: root
        repos:
          - /opt/nntmux-setup
          - /root/pierre-job-agent
          - /root/whisper-web
      141:
        user: root
        repos:
          - /opt/ibidder
      148:
        user: anthony
        repos:
          - /home/anthony/Projects/Cadence
          - /home/anthony/Projects/Stagioni
          - /home/anthony/Projects/HomelabDashboard
          - /home/anthony/Projects/wavelength

  tasks:
    - name: git-precommit-gate | create staging directory on the Proxmox host
      ansible.builtin.file:
        path: /tmp/git-hooks-stage
        state: directory
        mode: "0755"

    - name: git-precommit-gate | stage installer + support files on the Proxmox host
      ansible.builtin.copy:
        src: "{{ git_precommit_gate_files_dir }}/{{ item }}"
        dest: "/tmp/git-hooks-stage/{{ item }}"
        mode: "{{ '0755' if item == 'install-git-hooks.sh' else '0644' }}"
      loop:
        - install-git-hooks.sh
        - gitleaks.toml
        - pre-commit-gitleaks.sh
        - pre-push-gitleaks.sh
        - pre-commit
        - pre-push

    - name: git-precommit-gate | check which target containers are actually running
      ansible.builtin.command: "pct status {{ item.key }}"
      register: git_precommit_gate_lxc_status
      changed_when: false
      failed_when: false
      loop: "{{ git_precommit_gate_lxc | dict2items }}"
      loop_control:
        label: "CT{{ item.key }}"

    - name: git-precommit-gate | push files and run the canonical installer in each running container
      ansible.builtin.shell:
        cmd: |
          set -eu
          VMID={{ item.item.key | quote }}
          USER={{ item.item.value.user | quote }}
          REPOS={{ item.item.value.repos | join(' ') | quote }}

          pct exec "$VMID" -- mkdir -p /tmp/git-hooks-stage
          for f in install-git-hooks.sh gitleaks.toml pre-commit-gitleaks.sh pre-push-gitleaks.sh pre-commit pre-push; do
            pct push "$VMID" "/tmp/git-hooks-stage/$f" "/tmp/git-hooks-stage/$f"
          done
          pct exec "$VMID" -- chmod +x /tmp/git-hooks-stage/install-git-hooks.sh

          pct exec "$VMID" -- env \
            GITLEAKS_VERSION={{ git_precommit_gate_gitleaks_version | quote }} \
            GITLEAKS_CHECKSUMS_SHA256={{ git_precommit_gate_gitleaks_checksums_sha256 | quote }} \
            TARGET_USER="$USER" \
            FILES_DIR=/tmp/git-hooks-stage \
            REPOS="$REPOS" \
            /tmp/git-hooks-stage/install-git-hooks.sh
      loop: "{{ git_precommit_gate_lxc_status.results }}"
      loop_control:
        label: "CT{{ item.item.key }}"
      when: item.stdout is search('status:\\s+running')
      register: git_precommit_gate_lxc_result
      changed_when: "'installed and checksum-verified' in git_precommit_gate_lxc_result.stdout | default('')"
      failed_when: false

    - name: git-precommit-gate | fail the play if any container's install/wire step reported an error
      ansible.builtin.fail:
        msg: "CT{{ item.item.item.key }} failed -- see output above for which repo/step. Nothing was silently skipped."
      loop: "{{ git_precommit_gate_lxc_result.results }}"
      loop_control:
        label: "CT{{ item.item.item.key }}"
      when:
        - item.skipped is not defined
        - item.rc is defined
        - item.rc != 0

    - name: git-precommit-gate | show skipped (not running) containers
      ansible.builtin.debug:
        msg: "CT{{ item.item.key }}: SKIPPED -- {{ item.stdout | default('not running') }}"
      loop: "{{ git_precommit_gate_lxc_status.results }}"
      loop_control:
        label: "CT{{ item.item.key }}"
      when: not (item.stdout is search('status:\\s+running'))

    - name: git-precommit-gate | results
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ git_precommit_gate_lxc_result.results }}"
      loop_control:
        label: "CT{{ item.item.item.key }}"
      when: item.skipped is not defined

- name: Deploy git pre-commit/pre-push gate — VM151 (direct SSH)
  hosts: vm151
  become: true
  tags: [git_precommit_gate, vm]
  roles:
    - git_precommit_gate
