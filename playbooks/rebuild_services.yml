# =========================================================
# CT106 — Proxmox Backup Server
# Installed via Debian package: proxmox-backup-server
# NAS mount: /mnt/pve/nas/Work/PBS-Datastore -> /mnt/pbs-datastore
# Port: 8007 (HTTPS)
# Features: nesting=1,fuse=1
# RESTORE FIRST — other containers depend on PBS backups
# =========================================================
- name: CT106 — Proxmox Backup Server
  hosts: pve
  become: false
  tags: ct106
  tasks:
    - name: CT106 — Install PBS via Debian package
      ansible.builtin.shell: |
        pct exec 106 -- bash -c "
          apt-get update -qq
          echo 'deb http://download.proxmox.com/debian/pbs bookworm pbs-no-subscription' > /etc/apt/sources.list.d/pbs.list
          curl -fsSL https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg -o /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
          apt-get update -qq
          apt-get install -y proxmox-backup-server
          systemctl enable proxmox-backup-server
          systemctl start proxmox-backup-server
          echo CT106_DONE
        "
      register: r
      changed_when: "'CT106_DONE' in r.stdout"

    - name: CT106 — Manual steps
      ansible.builtin.debug:
        msg:
          - "RESTORE FIRST — before all other containers"
          - "1. PBS UI: https://192.168.55.106:8007"
          - "2. Add datastore at /mnt/pbs-datastore (QNAP NAS mount)"
          - "3. Configure backup schedule: daily 4am, keep-last=7, keep-weekly=4"
          - "4. Add Proxmox host as remote to enable restores"
          - "5. NAS mount set before start: /mnt/pve/nas/Work/PBS-Datastore -> /mnt/pbs-datastore"
          - "6. Features: nesting=1,fuse=1 required"

# =========================================================
# CT110 — SABnzbd (Usenet Downloader)
# Binary install at /opt/sabnzbd/
# Runs as user: plex, group: media (gid 990)
# Port: 7777
# Extra: par2, unrar, p7zip-full (post-processing essentials)
# NAS mounts required
# KEEP AT 2GB RAM MINIMUM — OOM incident history
# =========================================================
- name: CT110 — SABnzbd
  hosts: pve
  become: false
  tags: ct110
  tasks:
    - name: CT110 — Install SABnzbd binary
      ansible.builtin.shell: |
        pct exec 110 -- bash -c "
          apt-get update -qq
          apt-get install -y par2 unrar p7zip-full python3 python3-pip git curl
          # Create media group and plex user (matches live config)
          groupadd -g 990 media 2>/dev/null || true
          useradd -u 999 -g 990 -M -s /usr/sbin/nologin plex 2>/dev/null || true
          mkdir -p /opt/sabnzbd
          # Clone SABnzbd from GitHub
          git clone https://github.com/sabnzbd/sabnzbd.git /opt/sabnzbd
          cd /opt/sabnzbd && pip3 install -r requirements.txt --break-system-packages
          cat > /etc/systemd/system/sabnzbd.service << 'EOF'
          [Unit]
          Description=SABnzbd
          After=network.target
          [Service]
          WorkingDirectory=/opt/sabnzbd
          ExecStart=python3 SABnzbd.py -s 0.0.0.0:7777
          Restart=always
          User=plex
          Group=media
          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable sabnzbd
          systemctl start sabnzbd
          echo CT110_DONE
        "
      register: r
      changed_when: "'CT110_DONE' in r.stdout"

    - name: CT110 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore SABnzbd config from PBS backup (/home/plex/.sabnzbd/ or /root/.sabnzbd/)"
          - "2. Usenet provider credentials from Vaultwarden"
          - "3. UI: http://192.168.55.110:7777"
          - "4. Download paths must point to NAS folders"
          - "5. MINIMUM 2GB RAM — do not reduce below this"
          - "6. Watch for par2 stuck loop (CPU 200%+) — kill process if seen"
          - "7. NAS mounts: /mnt/nas/Expanded, /mnt/nas/Media, /mnt/nas/Work, /mnt/nas/Workspace"

# =========================================================
# CT113 — Cloudflared (Tunnel)
# Installed via Debian package: cloudflared
# Tunnel ID: dcc88300-9517-4e1a-b5a4-103397ba6779
# Config: /etc/cloudflared/config.yml (NOT /root/.cloudflared/)
# Credentials: /root/.cloudflared/dcc88300-*.json
# CRITICAL: Restoring this brings all sevenbirches.co.uk domains back
# VPS cloudflared-resilience must stay STOPPED
# =========================================================
- name: CT113 — Cloudflared
  hosts: pve
  become: false
  tags: ct113
  tasks:
    - name: CT113 — Install cloudflared package
      ansible.builtin.shell: |
        pct exec 113 -- bash -c "
          apt-get update -qq
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared bookworm main' > /etc/apt/sources.list.d/cloudflared.list
          apt-get update -qq
          apt-get install -y cloudflared
          mkdir -p /etc/cloudflared /root/.cloudflared
          echo CT113_DONE
        "
      register: r
      changed_when: "'CT113_DONE' in r.stdout"

    - name: CT113 — Manual steps
      ansible.builtin.debug:
        msg:
          - "CRITICAL — restoring this brings all sevenbirches.co.uk domains online"
          - "1. Restore /root/.cloudflared/dcc88300-9517-4e1a-b5a4-103397ba6779.json from CT142"
          - "2. Restore /etc/cloudflared/config.yml from CT142 backup"
          - "   (config.yml NOT /root/.cloudflared/ — that location is stale)"
          - "3. cloudflared service install"
          - "4. systemctl enable cloudflared && systemctl start cloudflared"
          - "5. Verify 4 tunnel connections register in journal"
          - "6. DO NOT start cloudflared-resilience on ihostart VPS (causes 404 lottery)"

# =========================================================
# CT116 — n8n (Workflow Automation)
# Installed as npm global package, version 2.19.2
# Node.js: installed via nodesource
# Env file: /opt/n8n.env
# Port: 5678
# 12 active workflows
# Features: keyctl=1,nesting=1
# =========================================================
- name: CT116 — n8n
  hosts: pve
  become: false
  tags: ct116
  tasks:
    - name: CT116 — Install Node.js and n8n
      ansible.builtin.shell: |
        pct exec 116 -- bash -c "
          apt-get update -qq
          apt-get install -y curl gnupg2 graphicsmagick build-essential
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          npm install -g n8n@2.19.2
          # Create env file (matches live config — no secrets)
          cat > /opt/n8n.env << 'EOF'
          N8N_SECURE_COOKIE=false
          N8N_PORT=5678
          N8N_PROTOCOL=https
          N8N_HOST=n8n.sevenbirches.co.uk
          WEBHOOK_URL=https://n8n.sevenbirches.co.uk/
          N8N_PROXY_HOPS=1
          N8N_TRUST_PROXY=true
          GENERIC_TIMEZONE=Europe/London
          TZ=Europe/London
          EXECUTIONS_DATA_PRUNE=true
          EXECUTIONS_DATA_MAX_AGE=7
          EXECUTIONS_DATA_PRUNE_MAX_COUNT=1000
          EOF
          cat > /etc/systemd/system/n8n.service << 'EOF'
          [Unit]
          Description=n8n
          [Service]
          Type=simple
          EnvironmentFile=/opt/n8n.env
          ExecStart=n8n start
          Restart=always
          RestartSec=10
          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable n8n
          systemctl start n8n
          echo CT116_DONE
        "
      register: r
      changed_when: "'CT116_DONE' in r.stdout"

    - name: CT116 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore /root/.n8n/ from PBS backup — restores all 12 workflows and credentials"
          - "2. Add N8N_BASIC_AUTH credentials to /opt/n8n.env from Vaultwarden"
          - "3. Add N8N_ENCRYPTION_KEY to /opt/n8n.env (from Vaultwarden — required to decrypt saved credentials)"
          - "4. After restore: reactivate webhook-triggered workflows"
          - "5. Update SSH credential in n8n to point at CT141 (192.168.55.141) and VM151 (192.168.55.151)"
          - "6. Minimum RAM: 4GB (upgraded from 2GB after OOM)"

