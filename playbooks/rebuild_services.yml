          - "8. NAS mounts: /mnt/nas/Expanded, /mnt/nas/Media, /mnt/nas/Work, /mnt/nas/Workspace"

# =========================================================
# CT130 — Vaultwarden (Password Manager)
# Binary at /opt/vaultwarden/bin/vaultwarden v1.36.0
# Env: /opt/vaultwarden/.env
# Data: /opt/vaultwarden/data/
# Web vault: /opt/vaultwarden/web-vault/
# Runs as user: vaultwarden
# Port: 8000
# Signups disabled, Invitations disabled, TOTP enabled
# =========================================================
- name: CT130 — Vaultwarden
  hosts: pve
  become: false
  tags: ct130
  tasks:
    - name: CT130 — Install Vaultwarden binary
      ansible.builtin.shell: |
        pct exec 130 -- bash -c "
          apt-get update -qq
          apt-get install -y curl argon2 git pkgconf build-essential
          # Create vaultwarden user
          useradd -m -s /usr/sbin/nologin vaultwarden 2>/dev/null || true
          mkdir -p /opt/vaultwarden/bin /opt/vaultwarden/data /opt/vaultwarden/web-vault
          # Extract binary from Alpine Docker image (statically linked, works on any glibc)
          apt-get install -y docker.io 2>/dev/null || true
          docker pull vaultwarden/server:1.36.0-alpine
          docker create --name vw_tmp vaultwarden/server:1.36.0-alpine
          docker cp vw_tmp:/vaultwarden /opt/vaultwarden/bin/vaultwarden
          docker cp vw_tmp:/web-vault /opt/vaultwarden/
          docker rm vw_tmp
          chmod +x /opt/vaultwarden/bin/vaultwarden
          chown -R vaultwarden:vaultwarden /opt/vaultwarden/
          # Create env file (non-secret values only)
          cat > /opt/vaultwarden/.env << 'EOF'
          ROCKET_ADDRESS=0.0.0.0
          DATA_FOLDER=/opt/vaultwarden/data
          DATABASE_MAX_CONNS=10
          WEB_VAULT_FOLDER=/opt/vaultwarden/web-vault
          WEB_VAULT_ENABLED=true
          SIGNUPS_ALLOWED=false
          INVITATIONS_ALLOWED=false
          EOF
          cat > /etc/systemd/system/vaultwarden.service << 'EOF'
          [Unit]
          Description=Bitwarden Server (Powered by Vaultwarden)
          Documentation=https://github.com/dani-garcia/vaultwarden
          After=network.target
          [Service]
          User=vaultwarden
          Group=vaultwarden
          EnvironmentFile=-/opt/vaultwarden/.env
          ExecStart=/opt/vaultwarden/bin/vaultwarden
          LimitNOFILE=65535
          LimitNPROC=4096
          PrivateTmp=true
          PrivateDevices=true
          ProtectHome=true
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable vaultwarden
          echo CT130_DONE
        "
      register: r
      changed_when: "'CT130_DONE' in r.stdout"

    - name: CT130 — Manual steps
      ansible.builtin.debug:
        msg:
          - "CRITICAL — restore data before starting service"
          - "1. Restore /opt/vaultwarden/data/ from PBS backup (contains all vault data)"
          - "2. Add ADMIN_TOKEN and other secrets to /opt/vaultwarden/.env from CT142"
          - "3. systemctl start vaultwarden only after data restore"
          - "4. TOTP will need re-setup after restore"
          - "5. Version: 1.36.0 — use same version tag when pulling Alpine image"
          - "6. bw CLI for batch ops: requires Node 20+, run bw sync before edits"

# =========================================================
# CT141 — OSINT Lab
# Ubuntu 22.04, 30GB root, 4GB RAM, 2 cores
# Has: google-chrome-stable, xvfb, nmap, nodejs, python3, ttyd
# i-bidder scraper at /opt/ibidder/ (needs DEEPSEEK_API_KEY)
# OSINT dashboard repo: github.com/mrapierre/osint-dashboard
# Ports: 8000 (FastAPI), 7681 (ttyd), 5001 (SpiderFoot)
# Crons: 0 7 * * * and 0 19 * * * /opt/ibidder/cron_run.sh
# =========================================================
- name: CT141 — OSINT Lab
  hosts: pve
  become: false
  tags: ct141
  tasks:
    - name: CT141 — Install tools
      ansible.builtin.shell: |
        pct exec 141 -- bash -c "
          apt-get update -qq
          apt-get install -y curl git python3 python3-pip python3-venv \
            nmap xvfb nodejs whois dnsutils sqlite3 unzip wget \
            software-properties-common apt-transport-https
          # Google Chrome (required for i-bidder WAF bypass with stealth mode)
          curl -fsSL https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -o /tmp/chrome.deb
          apt-get install -y /tmp/chrome.deb 2>/dev/null || apt-get -f install -y
          # ttyd for terminal access (port 7681)
          curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o /usr/local/bin/ttyd
          chmod +x /usr/local/bin/ttyd
          echo CT141_DONE
        "
      register: r
      changed_when: "'CT141_DONE' in r.stdout"

    - name: CT141 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore /opt/ibidder/ from PBS backup (scraper, evaluate.py, config.py, deliver.py, cron_run.sh)"
          - "2. Restore /root/.env with DEEPSEEK_API_KEY (required — evaluate.py fails silently without it)"
          - "3. Clone osint-dashboard: git clone git@github.com:mrapierre/osint-dashboard.git /opt/osint"
          - "4. Deploy key: ct141-osint-dashboard at /root/.ssh/id_ed25519_github"
          - "5. Add crons: 0 7 * * * and 0 19 * * * /opt/ibidder/cron_run.sh"
          - "6. n8n SSH credential must point to 192.168.55.141"
          - "7. WAF cookie auto-refreshes via headless Chrome — no manual refresh needed"
          - "8. DeepSeek model: deepseek-v4-flash (deepseek-chat deprecated Jul 2026)"

