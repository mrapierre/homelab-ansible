# CT141 — OSINT Lab
# OS: Ubuntu 22.04, 2 cores, 4GB RAM, 30GB root (tank-storage)
# Ports: 8000 (FastAPI), 7681 (ttyd), 5001 (SpiderFoot)
# Has: google-chrome-stable, xvfb, nmap, nodejs, python3, git
# i-bidder scraper at /opt/ibidder/ (requires DEEPSEEK_API_KEY in /root/.env)
# WAF cookie auto-refresh via headless Chrome
# Features: nesting=1

- name: CT141 — OSINT Lab
  hosts: pve
  become: false
  tags: ct141
  tasks:
    - name: CT141 — Install base tools
      ansible.builtin.shell: |
        pct exec 141 -- bash -c "
          apt-get update -qq
          apt-get install -y curl git python3 python3-pip python3-venv \
            nmap xvfb nodejs whois dnsutils sqlite3 unzip
          # Install Google Chrome (required for i-bidder WAF bypass)
          curl -fsSL https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -o /tmp/chrome.deb
          apt-get install -y /tmp/chrome.deb || apt-get install -f -y
          # Install ttyd for terminal access
          curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o /usr/local/bin/ttyd
          chmod +x /usr/local/bin/ttyd
          # Clone OSINT dashboard
          git clone git@github.com:mrapierre/osint-dashboard.git /opt/osint 2>/dev/null || true
          cd /opt/osint && pip3 install -r requirements.txt --break-system-packages 2>/dev/null || true
          echo CT141_DONE
        "
      register: r
      changed_when: "'CT141_DONE' in r.stdout"

    - name: CT141 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore /opt/ibidder/ from PBS backup (scraper, config, cookies)"
          - "2. Restore /root/.env with DEEPSEEK_API_KEY"
          - "3. i-bidder WAF: refresh_cookie.py runs headless Chrome 148 stealth"
          - "4. Cron jobs: 0 7 * * * and 0 19 * * * /opt/ibidder/cron_run.sh"
          - "5. n8n SSH credential must point to this container (192.168.55.141)"
          - "6. SpiderFoot on port 5001, osint-dashboard on 8000, ttyd on 7681"
          - "7. Deploy key for osint-dashboard: ct141-osint-dashboard at /root/.ssh/"

