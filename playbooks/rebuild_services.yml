          - "RESTORE EARLY — credential-inventory.md needed for all other containers"
          - "1. Restore /opt/private-docs/ from PBS backup"
          - "2. credential-inventory.md contains ALL service passwords, tokens and keys"
          - "3. WireGuard-only access — only reachable via WireGuard VPN"
          - "4. Hugo renders docs via nginx"
          - "5. Restore SSH deploy keys for private GitHub repos"

# =========================================================
# CT145 — Kali Lab (Security Testing)
# Kali Linux rolling, 20GB root, 2GB RAM, 2 cores
# Tools: metasploit, nmap, nikto, hydra, john, sqlmap, wireshark, dirb, exploitdb
# Also on vmbr99 isolated network (10.99.0.2/24)
# Metasploitable2 target: VM146 at 10.99.0.10
# =========================================================
- name: CT145 — Kali Lab
  hosts: pve
  become: false
  tags: ct145
  tasks:
    - name: CT145 — Install Kali security tools
      ansible.builtin.shell: |
        pct exec 145 -- bash -c "
          # Ensure Kali rolling repo
          echo 'deb http://http.kali.org/kali kali-rolling main non-free contrib' > /etc/apt/sources.list
          apt-get update -qq
          apt-get install -y \
            metasploit-framework nmap nikto hydra john sqlmap \
            wireshark dirb exploitdb tmux ffmpeg netcat-openbsd \
            netcat-traditional net-tools curl git python3 python3-pip
          msfdb init 2>/dev/null || true
          echo CT145_DONE
        "
      register: r
      changed_when: "'CT145_DONE' in r.stdout"

    - name: CT145 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Add isolated network BEFORE starting: pct set 145 --net1 name=eth1,bridge=vmbr99,ip=10.99.0.2/24"
          - "2. Run msfdb init after install to initialise Metasploit DB"
          - "3. Metasploitable2 target: VM146 at 10.99.0.10 on isolated vmbr99"
          - "4. Never use inline # comments in Metasploit set commands"
          - "5. Use tmux for long-running exploits"

# =========================================================
# CT104 — ai-lab (MCP Server + Claude Code)
# Ubuntu 24.04, 2GB RAM, 2 cores
# Node.js v24.14.0 via nvm
# Services: homelab-mcp.service, ttyd.service, claude-ttyd.service
# MCP server at /opt/mcp-server/ (github.com/mrapierre/homelab-mcp-server)
# Port: 3000 (MCP), 7681 (ttyd), 7682 (claude-ttyd)
# Ansible also installed here: /opt/ansible/
# =========================================================
- name: CT104 — ai-lab
  hosts: pve
  become: false
  tags: ct104
  tasks:
    - name: CT104 — Install nvm, Node.js, and MCP server
      ansible.builtin.shell: |
        pct exec 104 -- bash -c "
          apt-get update -qq
          apt-get install -y curl git tmux ttyd python3 python3-pip python3-venv pipx
          # Install nvm
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
          export NVM_DIR='/root/.nvm'
          source /root/.nvm/nvm.sh
          nvm install 24.14.0
          nvm use 24.14.0
          NODE_BIN=/root/.nvm/versions/node/v24.14.0/bin
          # Clone and install MCP server
          mkdir -p /opt/mcp-server
          git clone git@github.com:mrapierre/homelab-mcp-server.git /opt/mcp-server
          cd /opt/mcp-server && \$NODE_BIN/npm install
          # Install Ansible
          pipx install ansible
          find /root -name 'ansible' | xargs -I{} cp {} /usr/bin/
          ansible-galaxy collection install community.proxmox community.general
          pip3 install proxmoxer requests paramiko --break-system-packages
          echo CT104_DONE
        "
      register: r
      changed_when: "'CT104_DONE' in r.stdout"

    - name: CT104 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore systemd service files from PBS backup:"
          - "   homelab-mcp.service, ttyd.service, claude-ttyd.service"
          - "2. homelab-mcp.service uses Node at /root/.nvm/versions/node/v24.14.0/bin/node"
          - "3. MCP_API_KEY in homelab-mcp.service from Vaultwarden"
          - "4. Restore /opt/ansible/ from PBS or GitHub (ansible repo)"
          - "5. Restore /opt/mcp-server/index.js from GitHub repo"
          - "6. claude-ttyd.service runs ttyd on port 7682 for claude.sevenbirches.co.uk"
          - "7. ttyd.service runs on port 7681 for terminal.sevenbirches.co.uk"
          - "8. Gemini CLI at /root/.nvm/versions/node/v24.14.0/bin/gemini"
          - "9. Claude Code installed as claude-user via npm"
