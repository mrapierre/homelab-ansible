# CT130 — Vaultwarden (Password Manager)
# OS: Debian 12, 4 cores, 1GB RAM, 6GB root (tank-storage)
# Port: 8000
# Has: argon2, build-essential, git, pkgconf
# Signups disabled, TOTP enabled
# Features: keyctl=1,nesting=1
# CRITICAL: Data directory contains all passwords — restore from PBS first

- name: CT130 — Vaultwarden
  hosts: pve
  become: false
  tags: ct130
  tasks:
    - name: CT130 — Install Vaultwarden
      ansible.builtin.shell: |
        pct exec 130 -- bash -c "
          apt-get update -qq
          apt-get install -y curl argon2 git pkgconf build-essential
          # Use Alpine Docker image to extract binary (statically linked)
          apt-get install -y docker.io 2>/dev/null || true
          docker pull vaultwarden/server:latest-alpine 2>/dev/null || true
          # Extract binary
          docker create --name vw_extract vaultwarden/server:latest-alpine 2>/dev/null || true
          docker cp vw_extract:/vaultwarden /usr/local/bin/vaultwarden 2>/dev/null || true
          docker rm vw_extract 2>/dev/null || true
          chmod +x /usr/local/bin/vaultwarden
          echo CT130_DONE
        "
      register: r
      changed_when: "'CT130_DONE' in r.stdout"

    - name: CT130 — Manual steps
      ansible.builtin.debug:
        msg:
          - "CRITICAL — restore data before starting service"
          - "1. Restore /var/lib/vaultwarden/ from PBS backup (contains all vault data)"
          - "2. Restore systemd unit and .env config"
          - "3. Signups disabled: SIGNUPS_ALLOWED=false in config"
          - "4. TOTP authenticator enabled — will need re-setup after restore"
          - "5. bw CLI requires Node 20+ for WASM crypto"
          - "6. Run bw sync before any batch edits"

