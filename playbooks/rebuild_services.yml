---
# Sevenbirches Homelab — Service Rebuild Playbook
# VERIFIED AGAINST LIVE SYSTEM 01 June 2026
# All install methods, paths, versions and users confirmed from live containers
#
# Run AFTER rebuild_containers.yml and after PBS restores where noted
# Each section is independent — run with --tags ct101 etc to target one container

# =========================================================
# CT101 — Sonarr v4 (TV Show Management)
# Binary install at /opt/Sonarr/ — NOT apt repo
# Data: /var/lib/sonarr/
# Port: 8989, User: root
# NAS mounts required (set before container start)
# =========================================================
- name: CT101 — Sonarr
  hosts: pve
  become: false
  tags: ct101
  tasks:
    - name: CT101 — Install Sonarr binary
      ansible.builtin.shell: |
        pct exec 101 -- bash -c "
          apt-get update -qq
          apt-get install -y curl sqlite3 mediainfo
          mkdir -p /opt/Sonarr /var/lib/sonarr
          # Download latest Sonarr v4 release
          curl -fsSL https://services.sonarr.tv/v1/download/main/latest?version=4&os=linux&arch=x64 -o /tmp/sonarr.tar.gz
          tar -xzf /tmp/sonarr.tar.gz -C /opt/
          # Create systemd service (matches live config exactly)
          cat > /etc/systemd/system/sonarr.service << 'EOF'
          [Unit]
          Description=Sonarr Daemon
          After=syslog.target network.target
          [Service]
          Type=simple
          ExecStart=/opt/Sonarr/Sonarr -nobrowser -data=/var/lib/sonarr/
          TimeoutStopSec=20
          KillMode=process
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable sonarr
          systemctl start sonarr
          echo CT101_DONE
        "
      register: r
      changed_when: "'CT101_DONE' in r.stdout"

    - name: CT101 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. PREFERRED: Restore /var/lib/sonarr/ from PBS backup — preserves all series, history, settings"
          - "2. NAS mounts must be set before start: /mnt/nas/Media, /mnt/nas/Expanded, /mnt/nas/Work, /mnt/nas/Workspace"
          - "3. UI: http://192.168.55.101:8989"
          - "4. After restore: reconnect Prowlarr indexers and SABnzbd download client"
          - "5. API key in Settings > General — update KB and n8n credentials after"

