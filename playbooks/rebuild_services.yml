---
# CT101 — Sonarr (TV Show Management)
# OS: Debian 12, 2 cores, 1GB RAM, 4GB root (tank-storage)
# NAS mounts: /mnt/nas/Media, /mnt/nas/Expanded, /mnt/nas/Work, /mnt/nas/Workspace
# Port: 8989
# No GPU passthrough needed
#
# PRE-START LXC CONFIG:
#   pct set 101 --mp0 /mnt/pve/nas/Expanded,mp=/mnt/nas/Expanded
#   pct set 101 --mp1 /mnt/pve/nas/Media,mp=/mnt/nas/Media
#   pct set 101 --mp2 /mnt/pve/nas/Work,mp=/mnt/nas/Work
#   pct set 101 --mp3 /mnt/pve/nas/Workspace,mp=/mnt/nas/Workspace
#   pct set 101 --features nesting=1

- name: CT101 — Sonarr
  hosts: pve
  become: false
  tags: ct101
  tasks:
    - name: CT101 — Install Sonarr v4
      ansible.builtin.shell: |
        pct exec 101 -- bash -c "
          apt-get update -qq
          apt-get install -y curl sqlite3
          # Add Sonarr repo
          curl -fsSL https://repo.sonarr.tv/keys/sonarr.asc | gpg --dearmor -o /usr/share/keyrings/sonarr.gpg
          echo 'deb [signed-by=/usr/share/keyrings/sonarr.gpg] https://repo.sonarr.tv/ stable main' > /etc/apt/sources.list.d/sonarr.list
          apt-get update -qq
          apt-get install -y sonarr
          systemctl enable sonarr
          systemctl start sonarr
          echo CT101_DONE
        "
      register: r
      changed_when: "'CT101_DONE' in r.stdout"

    - name: CT101 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore /var/lib/sonarr from PBS backup (preserves series, history, settings)"
          - "2. Verify NAS mounts: /mnt/nas/Media and /mnt/nas/Expanded"
          - "3. Check root folders in Sonarr UI at http://192.168.55.101:8989"
          - "4. Reconnect Prowlarr indexers and SABnzbd download client"
          - "5. API key is in Sonarr Settings > General (update KB and n8n credentials)"

