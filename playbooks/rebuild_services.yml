# CT145 — Kali Lab (Security Testing)
# OS: Kali Linux (Debian-based), 2 cores, 2GB RAM, 20GB root (tank-storage)
# Has: metasploit-framework, nmap, nikto, hydra, john, sqlmap, wireshark,
#      dirb, exploitdb, tmux, ffmpeg
# Also on vmbr99 isolated network (10.99.0.0/24) for lab targeting
# Metasploitable2 target: VM146 at 10.99.0.10
# Features: nesting=1
#
# PRE-START:
#   pct set 145 --net1 name=eth1,bridge=vmbr99,ip=10.99.0.2/24

- name: CT145 — Kali Lab
  hosts: pve
  become: false
  tags: ct145
  tasks:
    - name: CT145 — Install Kali tools
      ansible.builtin.shell: |
        pct exec 145 -- bash -c "
          # Add Kali repo
          echo 'deb http://http.kali.org/kali kali-rolling main non-free contrib' > /etc/apt/sources.list
          curl -fsSL https://archive.kali.org/archive-key.asc | gpg --dearmor -o /usr/share/keyrings/kali-archive-keyring.gpg
          apt-get update -qq
          apt-get install -y \
            metasploit-framework nmap nikto hydra john sqlmap \
            wireshark dirb exploitdb tmux ffmpeg netcat-traditional \
            netcat-openbsd net-tools curl git python3 python3-pip
          # Init Metasploit DB
          msfdb init 2>/dev/null || true
          echo CT145_DONE
        "
      register: r
      changed_when: "'CT145_DONE' in r.stdout"

    - name: CT145 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Kali uses kali-rolling repo — packages may differ from original"
          - "2. Add isolated network: pct set 145 --net1 name=eth1,bridge=vmbr99,ip=10.99.0.2/24"
          - "3. Run msfdb init to initialise Metasploit database"
          - "4. Metasploitable2 target at 10.99.0.10 (VM146) on isolated vmbr99"
          - "5. Never inline comments in Metasploit set commands"
          - "6. tmux session recommended for long running exploits"
