# CT110 — SABnzbd (Usenet Downloader)
# OS: Debian 12, 4 cores, 2GB RAM, 8GB root (tank-storage)
# NAS mounts: same as CT100/101/102
# Port: 7777
# Extra packages: par2, unrar, p7zip-full (post-processing)
#
# PRE-START:
#   pct set 110 --mp0 /mnt/pve/nas/Expanded,mp=/mnt/nas/Expanded
#   pct set 110 --mp1 /mnt/pve/nas/Media,mp=/mnt/nas/Media
#   pct set 110 --mp2 /mnt/pve/nas/Work,mp=/mnt/nas/Work
#   pct set 110 --mp3 /mnt/pve/nas/Workspace,mp=/mnt/nas/Workspace
#   pct set 110 --features nesting=1

- name: CT110 — SABnzbd
  hosts: pve
  become: false
  tags: ct110
  tasks:
    - name: CT110 — Install SABnzbd and post-processing tools
      ansible.builtin.shell: |
        pct exec 110 -- bash -c "
          apt-get update -qq
          apt-get install -y par2 unrar p7zip-full python3 python3-pip git
          # Install SABnzbd via pip
          pip3 install sabnzbd --break-system-packages
          # Or via apt if available
          apt-get install -y sabnzbd 2>/dev/null || true
          systemctl enable sabnzbd 2>/dev/null || true
          systemctl start sabnzbd 2>/dev/null || true
          echo CT110_DONE
        "
      register: r
      changed_when: "'CT110_DONE' in r.stdout"

    - name: CT110 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore SABnzbd config from PBS backup (/home/sabnzbd/.sabnzbd/)"
          - "2. UI at http://192.168.55.110:7777"
          - "3. Usenet provider credentials in Vaultwarden"
          - "4. Download paths should point to /mnt/nas/ folders"
          - "5. NOTE: SABnzbd was given 2GB RAM after OOM incident — keep at minimum 2GB"
          - "6. Watch for par2 stuck loop (CPU 200%+) — kill par2 process if seen"

