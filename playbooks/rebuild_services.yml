# CT106 — Proxmox Backup Server (PBS)
# OS: Debian 12, 2 cores, 1GB RAM, 10GB root (tank-storage)
# CRITICAL: Restore this FIRST before all other containers
# NAS mount: /mnt/pve/nas/Work/PBS-Datastore -> /mnt/pbs-datastore
# Features: nesting=1,fuse=1
# Port: 8007 (HTTPS)
# Schedule: Daily 4am, keep-last=7 keep-weekly=4
#
# PRE-START:
#   pct set 106 --mp0 /mnt/pve/nas/Work/PBS-Datastore,mp=/mnt/pbs-datastore
#   pct set 106 --features nesting=1,fuse=1

- name: CT106 — Proxmox Backup Server
  hosts: pve
  become: false
  tags: ct106
  tasks:
    - name: CT106 — Install PBS
      ansible.builtin.shell: |
        pct exec 106 -- bash -c "
          apt-get update -qq
          # Add PBS repo (Debian-based official)
          echo 'deb http://download.proxmox.com/debian/pbs bookworm pbs-no-subscription' > /etc/apt/sources.list.d/pbs.list
          curl -fsSL https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg -o /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
          apt-get update -qq
          apt-get install -y proxmox-backup-server
          systemctl enable proxmox-backup-server
          systemctl start proxmox-backup-server
          echo CT106_DONE
        "
      register: r
      changed_when: "'CT106_DONE' in r.stdout"

    - name: CT106 — Manual steps
      ansible.builtin.debug:
        msg:
          - "CRITICAL — RESTORE PBS FIRST"
          - "1. PBS UI at https://192.168.55.106:8007"
          - "2. Add datastore pointing to /mnt/pbs-datastore (QNAP NAS)"
          - "3. Configure Proxmox host to use this PBS as backup target"
          - "4. Schedule: daily 4am, keep-last=7, keep-weekly=4"
          - "5. Once PBS is configured, restore all other containers from backup"

