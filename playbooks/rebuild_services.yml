# CT116 — n8n (Workflow Automation)
# OS: Debian 12, 2 cores, 4GB RAM, 6GB root (tank-storage)
# Port: 5678
# Has: nodejs, graphicsmagick, build-essential
# 12 active workflows, execution pruning enabled
# Features: keyctl=1,nesting=1

- name: CT116 — n8n
  hosts: pve
  become: false
  tags: ct116
  tasks:
    - name: CT116 — Install Node.js and n8n
      ansible.builtin.shell: |
        pct exec 116 -- bash -c "
          apt-get update -qq
          apt-get install -y curl gnupg2 graphicsmagick build-essential
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          npm install -g n8n
          # Create systemd service
          cat > /etc/systemd/system/n8n.service << 'EOF'
          [Unit]
          Description=n8n workflow automation
          After=network.target

          [Service]
          Type=simple
          User=root
          Environment=N8N_BASIC_AUTH_ACTIVE=true
          Environment=EXECUTIONS_DATA_PRUNE=true
          Environment=EXECUTIONS_DATA_MAX_AGE=7
          Environment=EXECUTIONS_DATA_PRUNE_MAX_COUNT=1000
          ExecStart=/usr/bin/n8n start
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable n8n
          systemctl start n8n
          echo CT116_DONE
        "
      register: r
      changed_when: "'CT116_DONE' in r.stdout"

    - name: CT116 — Manual steps
      ansible.builtin.debug:
        msg:
          - "1. Restore n8n data from PBS backup (/root/.n8n/)"
          - "2. This restores all 12 workflows, credentials and settings"
          - "3. Update SSH credentials in n8n to point at CT141 (192.168.55.141)"
          - "   and VM151 (192.168.55.151)"
          - "4. Reactivate webhook-triggered workflows after restore"
          - "5. RAM: keep at minimum 4GB (upgraded from 2GB after OOM)"
          - "6. n8n MCP URL: https://n8n.sevenbirches.co.uk/mcp-server/http"

