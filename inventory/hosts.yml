# Static inventory for Sevenbirches homelab
# Proxmox host
[proxmox_host]
pve ansible_host=192.168.55.10 ansible_user=root ansible_ssh_private_key_file=/root/.ssh/id_rsa

# LXC containers via proxmox_pct_remote (SSH to PVE host then pct exec)
[lxc_containers]
ct100 vmid=100
ct101 vmid=101
ct102 vmid=102
ct103 vmid=103
ct104 vmid=104
ct105 vmid=105
ct110 vmid=110
ct113 vmid=113
ct116 vmid=116
ct120 vmid=120
ct130 vmid=130
ct141 vmid=141
ct142 vmid=142
ct145 vmid=145

[lxc_containers:vars]
ansible_connection=community.proxmox.proxmox_pct_remote
ansible_proxmox_host=192.168.55.10
ansible_proxmox_user=root
ansible_ssh_private_key_file=/root/.ssh/id_rsa

# VMs with direct SSH
[vms]
vm151 ansible_host=192.168.55.151 ansible_user=root ansible_ssh_private_key_file=/root/.ssh/id_rsa

# Remote servers
[vps_ihostart]
ihostart ansible_host=94.156.152.232 ansible_user=root ansible_ssh_private_key_file=/root/.ssh/id_rsa

[vps_oracle]
oracle ansible_host=145.241.239.205 ansible_user=ubuntu ansible_ssh_private_key_file=/root/.ssh/oracle_vps

[all_servers:children]
proxmox_host
vms
vps_ihostart
vps_oracle
