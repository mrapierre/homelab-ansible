# Static inventory for Sevenbirches homelab
# Proxmox host
[proxmox_host]
pve ansible_host=192.168.55.10 ansible_user=root ansible_ssh_private_key_file=/root/.ssh/id_rsa

# Containers reachable via pct exec (through Proxmox host)
# These use the proxmox_pct_remote connection plugin
[lxc_containers]
ct100 ansible_host=192.168.55.100 vmid=100
ct101 ansible_host=192.168.55.101 vmid=101
ct102 ansible_host=192.168.55.102 vmid=102
ct103 ansible_host=192.168.55.103 vmid=103
ct104 ansible_host=192.168.55.104 vmid=104
ct105 ansible_host=192.168.55.105 vmid=105
ct110 ansible_host=192.168.55.110 vmid=110
ct113 ansible_host=192.168.55.113 vmid=113
ct116 ansible_host=192.168.55.116 vmid=116
ct120 ansible_host=192.168.55.120 vmid=120
ct130 ansible_host=192.168.55.130 vmid=130
ct141 ansible_host=192.168.55.141 vmid=141
ct142 ansible_host=192.168.55.142 vmid=142
ct145 ansible_host=192.168.55.145 vmid=145

[lxc_containers:vars]
ansible_connection=community.proxmox.proxmox_pct_remote
ansible_proxmox_host=192.168.55.10
ansible_proxmox_user=root@pam
ansible_proxmox_password={{ proxmox_root_password }}

# VMs with direct SSH
[vms]
vm151 ansible_host=192.168.55.151 ansible_user=root ansible_ssh_private_key_file=/root/.ssh/id_rsa

# Remote servers
[vps_ihostart]
ihostart ansible_host=94.156.152.232 ansible_user=root ansible_ssh_private_key_file=/root/.ssh/id_rsa

[vps_oracle]
oracle ansible_host=145.241.239.205 ansible_user=ubuntu ansible_ssh_private_key_file=/root/.ssh/oracle_vps

[all_servers:children]
proxmox_host
vms
vps_ihostart
vps_oracle
